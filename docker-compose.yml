version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///fraud_detection.db
      - API_PORT=5000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models

  frontend:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npm run build && npx serve -s dist -l 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
